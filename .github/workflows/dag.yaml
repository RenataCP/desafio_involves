on: 
  pull_request:
    branches:
      - main
    paths:
      - 'dags/**'

jobs:
  validate: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-python@v5
        with: 
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .github/workflows/dags/tests/requirements.txt

      - name: Lint
        run: ruff check dags/

      - name: Tests
        run: pytest .github/workflows/dags/tests/ -v